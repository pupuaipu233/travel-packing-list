<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行极简打包清单工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .card {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        .card h2 { color: #4a6fa5; margin-bottom: 20px; font-size: 1.5em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .preferences { display: flex; flex-wrap: wrap; gap: 10px; }
        .preference-tag {
            padding: 8px 16px;
            background-color: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        .preference-tag:hover { background-color: #e0e0e0; }
        .preference-tag.selected {
            background-color: #667eea;
            color: white;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .result { display: none; margin-top: 30px; }
        .result.show { display: block; }
        .list-section {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .list-section h3 {
            color: #4a6fa5;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-list { list-style: none; }
        .item-list li {
            padding: 10px;
            background-color: white;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .item-list li::before {
            content: "☐";
            color: #667eea;
            font-size: 1.2em;
        }
        .ai-tips {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .ai-tips h4 { margin-bottom: 10px; }
        .history { margin-top: 30px; }
        .history-item {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .history-item:hover { background-color: #e9ecef; }
        .history-item .info { font-weight: 500; color: #4a6fa5; }
        .history-item .meta { font-size: 0.9em; color: #666; margin-top: 5px; }
        .history-item .date { font-size: 0.8em; color: #999; margin-top: 5px; }
        .ai-tag {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-left: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .empty-state-icon { font-size: 3em; margin-bottom: 10px; }
        .error {
            background-color: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎒 旅行极简打包清单</h1>
        <p class="subtitle">智能生成个性化打包清单，让旅行准备更轻松</p>
        
        <div class="card">
            <h2>📝 行程信息</h2>
            
            <div class="form-group">
                <label for="travel-days">旅行天数 *</label>
                <select id="travel-days" required>
                    <option value="">请选择天数</option>
                    <option value="1">1天</option>
                    <option value="2">2天</option>
                    <option value="3">3天</option>
                    <option value="4">4天</option>
                    <option value="5">5天</option>
                    <option value="6">6天</option>
                    <option value="7">7天</option>
                    <option value="8">8天</option>
                    <option value="9">9天</option>
                    <option value="10">10天</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="destination">目的地 *</label>
                <input type="text" id="destination" placeholder="例如：三亚、北京、东京..." required>
            </div>
            
            <div class="form-group">
                <label for="weather">目的地天气（选填）</label>
                <select id="weather">
                    <option value="">未知</option>
                    <option value="晴天">☀️ 晴天</option>
                    <option value="雨天">🌧️ 雨天</option>
                    <option value="低温">❄️ 低温</option>
                    <option value="多云">☁️ 多云</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="trip-purpose">出行目的（选填）</label>
                <select id="trip-purpose">
                    <option value="">请选择</option>
                    <option value="度假">🏖️ 度假</option>
                    <option value="商务">💼 商务</option>
                    <option value="探亲">👨‍👩‍👧‍👦 探亲</option>
                    <option value="户外">🏕️ 户外</option>
                    <option value="文化">🏛️ 文化</option>
                    <option value="购物">🛍️ 购物</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="traveler-type">旅行者类型（选填）</label>
                <select id="traveler-type">
                    <option value="">请选择</option>
                    <option value="单人">🧑 单人</option>
                    <option value="情侣">💑 情侣</option>
                    <option value="亲子">👨‍👩‍👧 亲子</option>
                    <option value="朋友">👫 朋友</option>
                    <option value="老年">👴 老年</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>个人偏好（可多选）</label>
                <div class="preferences" id="preferences">
                    <span class="preference-tag" data-value="摄影">📷 摄影</span>
                    <span class="preference-tag" data-value="美食">🍜 美食</span>
                    <span class="preference-tag" data-value="购物">🛍️ 购物</span>
                    <span class="preference-tag" data-value="运动">⚽ 运动</span>
                    <span class="preference-tag" data-value="文化">🎭 文化</span>
                    <span class="preference-tag" data-value="自然">🌲 自然</span>
                    <span class="preference-tag" data-value="夜生活">🌃 夜生活</span>
                    <span class="preference-tag" data-value="放松">🧘 放松</span>
                </div>
            </div>
            
            <button class="btn" onclick="generateSmart()">✨ AI 智能生成</button>
            <button class="btn btn-secondary" onclick="generateBasic()">⚡ 快速生成</button>
        </div>
        
        <div class="card result" id="result">
            <h2>📋 打包清单</h2>
            <div id="result-content"></div>
        </div>
        
        <div class="card history">
            <h2>📚 历史记录</h2>
            <div id="history-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>暂无历史记录</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 本地存储键名
        const STORAGE_KEY = 'packing_list_history';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            setupPreferences();
        });
        
        // 设置偏好选择
        function setupPreferences() {
            const tags = document.querySelectorAll('.preference-tag');
            tags.forEach(tag => {
                tag.addEventListener('click', () => {
                    tag.classList.toggle('selected');
                });
            });
        }
        
        // 获取选中的偏好
        function getSelectedPreferences() {
            const selected = document.querySelectorAll('.preference-tag.selected');
            return Array.from(selected).map(tag => tag.dataset.value);
        }
        
        // 基础生成
        function generateBasic() {
            const travelDays = document.getElementById('travel-days').value;
            const weather = document.getElementById('weather').value;
            const destination = document.getElementById('destination').value;
            
            if (!travelDays) {
                alert('请选择旅行天数');
                return;
            }
            
            const listContent = generateBasicList(travelDays, weather);
            const data = {
                travel_days: parseInt(travelDays),
                destination: destination || null,
                weather: weather || '未指定',
                list_content: listContent,
                ai_generated: false,
                created_at: new Date().toISOString()
            };
            
            saveToHistory(data);
            displayList(listContent);
        }
        
        // 智能生成
        function generateSmart() {
            const travelDays = document.getElementById('travel-days').value;
            const destination = document.getElementById('destination').value;
            const weather = document.getElementById('weather').value;
            const tripPurpose = document.getElementById('trip-purpose').value;
            const travelerType = document.getElementById('traveler-type').value;
            const preferences = getSelectedPreferences();
            
            if (!travelDays) {
                alert('请选择旅行天数');
                return;
            }
            
            if (!destination) {
                alert('请输入目的地');
                return;
            }
            
            // 显示加载状态
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('result-content');
            resultDiv.classList.add('show');
            resultContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在生成智能清单...</p>
                </div>
            `;
            
            // 模拟异步生成
            setTimeout(() => {
                const listContent = generateSmartList({
                    travel_days: travelDays,
                    destination,
                    weather,
                    trip_purpose: tripPurpose,
                    traveler_type: travelerType,
                    preferences
                });
                
                const data = {
                    travel_days: parseInt(travelDays),
                    destination,
                    weather: weather || '未指定',
                    trip_purpose: tripPurpose || null,
                    traveler_type: travelerType || null,
                    preferences,
                    list_content: listContent,
                    ai_tips: listContent.tips,
                    ai_generated: true,
                    created_at: new Date().toISOString()
                };
                
                saveToHistory(data);
                displayList(listContent, listContent.tips, true);
            }, 500);
        }
        
        // 基础清单生成逻辑
        function generateBasicList(travelDays, weather) {
            const mustHave = ['身份证', '手机', '充电器', '充电宝', `换洗衣物（${travelDays}套）`];
            const optional = ['洗漱用品'];
            
            if (weather === '雨天') {
                mustHave.push('雨具');
                optional.push('雨伞', '防水鞋套');
            } else if (weather === '低温') {
                mustHave.push('厚外套');
                optional.push('围巾', '手套', '帽子');
            } else if (weather === '晴天') {
                optional.push('帽子', '墨镜');
            }
            
            return {
                must_have: mustHave,
                optional: optional
            };
        }
        
        // 智能清单生成逻辑
        function generateSmartList(params) {
            const { travel_days, destination, weather, trip_purpose, traveler_type, preferences } = params;
            
            const mustHave = ['身份证', '手机', '充电器', '充电宝', `换洗衣物（${travel_days}套）`];
            const optional = ['洗漱用品'];
            let tips = '';
            
            // 根据目的地
            if (destination) {
                const dest = destination.toLowerCase();
                if (dest.includes('三亚') || dest.includes('海') || dest.includes('岛')) {
                    mustHave.push('防晒霜', '泳衣', '墨镜');
                    optional.push('沙滩拖鞋', '遮阳帽', '防水手机袋');
                    tips = `${destination}阳光强烈，注意防晒。建议携带高倍数防晒霜。`;
                } else if (dest.includes('北京') || dest.includes('上海') || dest.includes('广州')) {
                    mustHave.push('雨伞', '舒适步行鞋');
                    optional.push('口罩', '充电宝');
                    tips = `${destination}城市游，建议穿舒适的鞋子，准备应对天气变化。`;
                } else if (dest.includes('山') || dest.includes('徒步')) {
                    mustHave.push('登山鞋', '背包', '水壶');
                    optional.push('登山杖', '护膝', '头灯');
                    tips = '山地徒步注意安全，准备充足的水和应急物品。';
                } else if (dest.includes('雪') || dest.includes('哈尔滨')) {
                    mustHave.push('厚羽绒服', '保暖内衣', '手套', '围巾', '帽子');
                    optional.push('暖宝宝', '雪地靴', '保温杯');
                    tips = '寒冷地区注意保暖，建议多层穿衣。';
                } else {
                    mustHave.push('雨伞');
                    optional.push('舒适步行鞋', '常用药品');
                    tips = `${destination}旅行，请根据实际情况调整清单。`;
                }
            }
            
            // 根据天气
            if (weather) {
                const w = weather.toLowerCase();
                if (w.includes('雨')) {
                    mustHave.push('雨具', '防水袋');
                    optional.push('雨伞', '防水鞋套');
                } else if (w.includes('冷') || w.includes('寒')) {
                    mustHave.push('厚外套', '保暖内衣');
                    optional.push('围巾', '手套', '帽子');
                } else if (w.includes('晴') || w.includes('热')) {
                    mustHave.push('防晒霜', '墨镜');
                    optional.push('帽子', '遮阳伞', '水壶');
                }
            }
            
            // 根据出行目的
            if (trip_purpose) {
                const purpose = trip_purpose.toLowerCase();
                if (purpose.includes('商务')) {
                    mustHave.push('正装', '名片');
                    optional.push('笔记本电脑', '转换插头');
                } else if (purpose.includes('摄影')) {
                    mustHave.push('相机', '备用电池');
                    optional.push('三脚架', '存储卡');
                } else if (purpose.includes('户外')) {
                    mustHave.push('背包', '水壶', '急救包');
                    optional.push('指南针', '多功能刀');
                }
            }
            
            // 根据旅行者类型
            if (traveler_type) {
                const type = traveler_type.toLowerCase();
                if (type.includes('亲子')) {
                    mustHave.push('儿童常用药品', '零食');
                    optional.push('玩具', '儿童防晒霜');
                } else if (type.includes('情侣')) {
                    optional.push('相机', '自拍杆');
                } else if (type.includes('老年')) {
                    mustHave.push('常用药品', '舒适鞋子');
                    optional.push('拐杖', '血压计');
                }
            }
            
            // 根据偏好
            if (preferences && preferences.length > 0) {
                preferences.forEach(pref => {
                    const p = pref.toLowerCase();
                    if (p.includes('摄影')) optional.push('相机', '三脚架');
                    else if (p.includes('美食')) optional.push('健胃消食片');
                    else if (p.includes('购物')) optional.push('折叠购物袋');
                    else if (p.includes('运动')) optional.push('运动装备');
                });
            }
            
            return {
                must_have: [...new Set(mustHave)].slice(0, 12),
                optional: [...new Set(optional)].slice(0, 8),
                tips: tips || '请根据实际情况调整清单'
            };
        }
        
        // 显示清单
        function displayList(listContent, aiTips = null, isAI = false) {
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('result-content');
            
            let html = '';
            
            if (isAI) {
                html += `<div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; display: inline-block;">🤖 AI 智能生成</div>`;
            }
            
            html += `
                <div class="list-section">
                    <h3>📦 必带物品（${listContent.must_have.length}项）</h3>
                    <ul class="item-list">
                        ${listContent.must_have.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="list-section">
                    <h3>🎒 可选物品（${listContent.optional.length}项）</h3>
                    <ul class="item-list">
                        ${listContent.optional.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            if (aiTips) {
                html += `
                    <div class="ai-tips">
                        <h4>💡 AI 特别提醒</h4>
                        <p>${aiTips}</p>
                    </div>
                `;
            }
            
            resultContent.innerHTML = html;
            resultDiv.classList.add('show');
            
            // 滚动到结果
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 保存到历史记录
        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            data.id = Date.now(); // 使用时间戳作为ID
            history.unshift(data);
            // 只保留最近20条
            history = history.slice(0, 20);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            loadHistory();
        }
        
        // 加载历史记录
        function loadHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            
            if (history.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>暂无历史记录</p>
                    </div>
                `;
                return;
            }
            
            const html = history.map(item => `
                <div class="history-item" onclick="loadHistoryItem(${item.id})">
                    <div class="info">
                        ${item.travel_days}天 · ${item.destination || '未指定目的地'} · ${item.weather || '未指定天气'}
                        ${item.ai_generated ? '<span class="ai-tag">AI</span>' : ''}
                    </div>
                    <div class="meta">
                        ${item.trip_purpose ? `🎯 ${item.trip_purpose}` : ''}
                        ${item.traveler_type ? `👥 ${item.traveler_type}` : ''}
                    </div>
                    <div class="date">${new Date(item.created_at).toLocaleString()}</div>
                </div>
            `).join('');
            
            historyList.innerHTML = html;
        }
        
        // 加载历史记录详情
        function loadHistoryItem(id) {
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const item = history.find(h => h.id === id);
            
            if (item) {
                // 填充表单
                document.getElementById('travel-days').value = item.travel_days;
                document.getElementById('destination').value = item.destination || '';
                document.getElementById('weather').value = item.weather || '';
                document.getElementById('trip-purpose').value = item.trip_purpose || '';
                document.getElementById('traveler-type').value = item.traveler_type || '';
                
                // 显示清单
                displayList(item.list_content, item.ai_tips, item.ai_generated);
                
                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
