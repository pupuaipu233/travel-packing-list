<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行极简打包清单工具 - AI智能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .card {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }
        
        .card h2 {
            color: #4a6fa5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #4a6fa5;
        }
        
        .preferences-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        
        .preference-tag {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            font-size: 14px;
        }
        
        .preference-tag:hover {
            border-color: #4a6fa5;
            background: #f0f4ff;
        }
        
        .preference-tag.selected {
            background: #4a6fa5;
            color: white;
            border-color: #4a6fa5;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-ai {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }
        
        .btn-ai::before {
            content: '✨';
            margin-right: 8px;
        }
        
        .btn-ai:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result h2 {
            color: #4a6fa5;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ai-badge {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .ai-tips {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f39c12;
        }
        
        .ai-tips h4 {
            color: #d68910;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ai-tips p {
            color: #7d6608;
            line-height: 1.6;
        }
        
        .item-category {
            margin-bottom: 25px;
        }
        
        .item-category h3 {
            color: #555;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .item-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        
        .item-list li {
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #4a6fa5;
            transition: all 0.3s;
        }
        
        .item-list li:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .history {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .history h2 {
            color: #4a6fa5;
            margin-bottom: 20px;
        }
        
        .history-list {
            list-style: none;
        }
        
        .history-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .history-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .history-item .info {
            font-size: 15px;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .history-item .meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .history-item .date {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .ai-tag {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .error {
            color: #e74c3c;
            background: #fdf2f2;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #4a6fa5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .weather-info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .weather-info-box.show {
            display: block;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .item-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧳 旅行极简打包清单</h1>
        <p class="subtitle">AI智能生成，让打包更轻松</p>
        
        <div class="card">
            <h2>📋 行程信息</h2>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="travel-days">旅行天数 *</label>
                    <select id="travel-days">
                        <option value="1">1天</option>
                        <option value="2">2天</option>
                        <option value="3" selected>3天</option>
                        <option value="4">4天</option>
                        <option value="5">5天</option>
                        <option value="6">6天</option>
                        <option value="7">7天</option>
                        <option value="8">8天</option>
                        <option value="9">9天</option>
                        <option value="10">10天</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="destination">目的地 *</label>
                    <input type="text" id="destination" placeholder="例如：三亚、北京、东京...">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="trip-purpose">出行目的</label>
                    <select id="trip-purpose">
                        <option value="">请选择目的</option>
                        <option value="度假">🏖️ 度假休闲</option>
                        <option value="商务">💼 商务出差</option>
                        <option value="探亲">👨‍👩‍👧‍👦 探亲访友</option>
                        <option value="户外">🏔️ 户外探险</option>
                        <option value="文化">🏛️ 文化游览</option>
                        <option value="购物">🛍️ 购物美食</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="traveler-type">旅行者类型</label>
                    <select id="traveler-type">
                        <option value="">请选择类型</option>
                        <option value="单人">🧍 单人出行</option>
                        <option value="情侣">💑 情侣出游</option>
                        <option value="亲子">👨‍👩‍👧‍👦 亲子家庭</option>
                        <option value="朋友">👫 朋友结伴</option>
                        <option value="老年">👴👵 老年出游</option>
                    </select>
                </div>
            </div>
            
            <!-- 天气信息显示区域 -->
            <div class="form-group full-width weather-info-box" id="weather-info">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                    <span style="font-size: 24px;">🌤️</span>
                    <strong style="font-size: 18px;">目的地天气</strong>
                </div>
                <div id="weather-details" style="font-size: 14px; opacity: 0.9;">
                    正在获取天气信息...
                </div>
            </div>
            
            <div class="form-group full-width">
                <label>个人偏好（可多选）</label>
                <div class="preferences-group">
                    <span class="preference-tag" data-value="摄影">📷 摄影</span>
                    <span class="preference-tag" data-value="美食">🍜 美食</span>
                    <span class="preference-tag" data-value="购物">🛍️ 购物</span>
                    <span class="preference-tag" data-value="运动">⚽ 运动</span>
                    <span class="preference-tag" data-value="文化">🎭 文化</span>
                    <span class="preference-tag" data-value="自然">🌲 自然</span>
                    <span class="preference-tag" data-value="夜生活">🌙 夜生活</span>
                    <span class="preference-tag" data-value="放松">🧘 放松</span>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-primary" id="generate-btn">
                    📝 快速生成
                </button>
                <button class="btn-ai" id="generate-ai-btn">
                    AI 智能生成
                </button>
            </div>
        </div>
        
        <div class="result" id="result">
            <h2>
                📦 打包清单
                <span class="ai-badge" id="ai-badge" style="display: none;">AI生成</span>
            </h2>
            
            <div class="ai-tips" id="ai-tips" style="display: none;">
                <h4>💡 AI特别提醒</h4>
                <p id="ai-tips-content"></p>
            </div>
            
            <div id="result-content"></div>
        </div>
        
        <div class="history">
            <h2>📚 历史记录</h2>
            <div id="history-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>暂无历史记录</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ===== 纯前端智能生成逻辑 =====
        
        // 目的地物品数据库
        const destinationDatabase = {
            '三亚': {
                mustHave: ['防晒霜(SPF50+)', '泳衣/泳裤', '墨镜', '沙滩拖鞋', '遮阳帽', '晒后修复'],
                optional: ['浮潜装备', '防水手机袋', '沙滩巾', '驱蚊液'],
                tips: '三亚阳光强烈，紫外线指数高，务必做好防晒措施。'
            },
            '北京': {
                mustHave: ['舒适步行鞋', '保湿护肤品', '口罩', '充电宝'],
                optional: ['自拍杆', '折叠伞', '润唇膏'],
                tips: '北京景点多为步行游览，建议穿舒适的鞋子。'
            },
            '上海': {
                mustHave: ['雨伞', '舒适步行鞋', '便携购物袋'],
                optional: ['地铁卡/交通卡', '相机', '时尚配饰'],
                tips: '上海天气多变，建议随身携带雨伞。'
            },
            '东京': {
                mustHave: ['便携雨伞', '零钱包(硬币多)', '舒适步行鞋'],
                optional: ['翻译APP', '充电宝', '购物清单'],
                tips: '东京购物天堂，记得带大容量行李箱。'
            },
            '巴黎': {
                mustHave: ['时尚外套', '舒适步行鞋', '防盗包'],
                optional: ['相机', '围巾', '便携雨伞'],
                tips: '巴黎早晚温差大，注意保暖。'
            },
            '纽约': {
                mustHave: ['舒适步行鞋', '便携雨伞', '充电宝'],
                optional: ['地铁卡', '小费现金', '购物袋'],
                tips: '纽约步行量大，建议穿舒适的鞋子。'
            },
            '泰国': {
                mustHave: ['防晒霜', '驱蚊液', '轻薄衣物', '凉鞋'],
                optional: ['泳衣', '防水袋', '肠胃药'],
                tips: '泰国蚊虫较多，注意防蚊和饮食卫生。'
            },
            '日本': {
                mustHave: ['便携雨伞', '零钱包', '舒适步行鞋'],
                optional: ['翻译器', '充电宝', '购物袋'],
                tips: '日本便利店随处可见，很多东西可以当地购买。'
            },
            '新加坡': {
                mustHave: ['轻薄衣物', '防晒霜', '雨伞', '墨镜'],
                optional: ['泳衣', '防蚊液', '便携风扇'],
                tips: '新加坡室内空调很冷，建议带一件薄外套。'
            },
            '香港': {
                mustHave: ['舒适步行鞋', '充电宝', '轻薄外套'],
                optional: ['八达通卡', '购物袋', '转换插头'],
                tips: '香港步行量大，商场空调很冷。'
            }
        };
        
        // 天气相关物品
        const weatherItems = {
            '晴天': {
                mustHave: ['防晒霜', '墨镜', '遮阳帽'],
                optional: ['便携风扇', '防晒衣']
            },
            '雨天': {
                mustHave: ['雨伞', '雨衣', '防水鞋套'],
                optional: ['防水袋', '备用袜子']
            },
            '阴天': {
                mustHave: ['轻薄外套'],
                optional: ['雨伞(备用)']
            },
            '雪天': {
                mustHave: ['保暖外套', '围巾', '手套', '帽子', '防滑鞋'],
                optional: ['暖宝宝', '保温杯']
            },
            '寒冷': {
                mustHave: ['厚外套', '保暖内衣', '围巾'],
                optional: ['暖宝宝', '保温杯']
            },
            '炎热': {
                mustHave: ['防晒霜', '墨镜', '便携风扇'],
                optional: ['清凉喷雾', '藿香正气水']
            }
        };
        
        // 出行目的相关物品
        const purposeItems = {
            '度假': {
                mustHave: ['休闲服装', '相机'],
                optional: ['泳装', '沙滩用品', '娱乐设备']
            },
            '商务': {
                mustHave: ['正装', '名片', '笔记本电脑', '充电器'],
                optional: ['便携熨斗', '文件袋']
            },
            '探亲': {
                mustHave: ['礼物', '舒适服装'],
                optional: ['特产', '儿童玩具']
            },
            '户外': {
                mustHave: ['登山鞋', '背包', '水壶', '急救包'],
                optional: ['登山杖', '指南针', '手电筒']
            },
            '文化': {
                mustHave: ['舒适步行鞋', '相机', '笔记本'],
                optional: ['导游书', '翻译器']
            },
            '购物': {
                mustHave: ['大容量行李箱', '购物清单'],
                optional: ['折叠购物袋', '便携秤']
            }
        };
        
        // 旅行者类型相关物品
        const travelerItems = {
            '单人': {
                mustHave: ['自拍杆', '充电宝'],
                optional: ['便携三脚架', '耳机']
            },
            '情侣': {
                mustHave: ['相机', '自拍杆'],
                optional: ['浪漫小物', '双人用品']
            },
            '亲子': {
                mustHave: ['儿童药品', '零食', '玩具', '湿巾'],
                optional: ['儿童推车', '儿童餐具']
            },
            '朋友': {
                mustHave: ['桌游/卡牌', '蓝牙音箱'],
                optional: ['团队用品', '共享充电器']
            },
            '老年': {
                mustHave: ['常用药品', '舒适鞋子', '保温杯'],
                optional: ['拐杖', '老花镜', '急救卡']
            }
        };
        
        // 偏好相关物品
        const preferenceItems = {
            '摄影': ['相机', '备用电池', '存储卡', '三脚架', '镜头清洁布'],
            '美食': ['健胃消食片', '便携餐具', '湿巾', '零食'],
            '购物': ['大容量行李箱', '折叠购物袋', '便携秤'],
            '运动': ['运动装备', '运动鞋', '运动水壶', '毛巾'],
            '文化': ['导游书', '笔记本', '笔', '翻译器'],
            '自然': ['驱蚊液', '户外装备', '指南针', '手电筒'],
            '夜生活': ['正式服装', '化妆品', '充电宝'],
            '放松': ['眼罩', '耳塞', '颈枕', '书籍/Kindle']
        };
        
        // 基础必带物品
        const baseMustHave = ['身份证/护照', '手机', '充电器', '充电宝', '钱包/现金'];
        
        // 获取目的地物品推荐
        async function fetchDestinationItems(destination, weather) {
            try {
                const response = await fetch(`/api/destination-items?destination=${encodeURIComponent(destination)}&weather=${encodeURIComponent(weather || '')}`);
                if (!response.ok) throw new Error('获取目的地物品失败');
                const data = await response.json();
                return data.success ? data.data.items : null;
            } catch (error) {
                console.error('获取目的地物品失败:', error);
                return null;
            }
        }

        // 智能清单生成函数
        async function generateSmartList(params) {
            const { travel_days, destination, weather, trip_purpose, traveler_type, preferences } = params;
            
            let mustHave = [...baseMustHave, `换洗衣物(${travel_days}套)`];
            let optional = ['洗漱用品', '毛巾'];
            let tips = [];
            
            // 尝试从 API 获取目的地物品
            if (destination) {
                const destinationItems = await fetchDestinationItems(destination, weather);
                if (destinationItems) {
                    mustHave.push(...destinationItems.must_have);
                    optional.push(...destinationItems.optional);
                    if (destinationItems.tips) {
                        tips.push(destinationItems.tips);
                    }
                } else {
                    // 如果 API 调用失败，使用本地数据库
                    const destKey = Object.keys(destinationDatabase).find(key => 
                        destination.includes(key) || key.includes(destination)
                    );
                    if (destKey) {
                        const destData = destinationDatabase[destKey];
                        mustHave.push(...destData.mustHave);
                        optional.push(...destData.optional);
                        tips.push(destData.tips);
                    }
                }
            }
            
            // 根据天气添加物品
            if (weather && weatherItems[weather]) {
                mustHave.push(...weatherItems[weather].mustHave);
                optional.push(...weatherItems[weather].optional);
            }
            
            // 根据出行目的添加物品
            if (trip_purpose && purposeItems[trip_purpose]) {
                mustHave.push(...purposeItems[trip_purpose].mustHave);
                optional.push(...purposeItems[trip_purpose].optional);
            }
            
            // 根据旅行者类型添加物品
            if (traveler_type && travelerItems[traveler_type]) {
                mustHave.push(...travelerItems[traveler_type].mustHave);
                optional.push(...travelerItems[traveler_type].optional);
            }
            
            // 根据偏好添加物品
            if (preferences && Array.isArray(preferences)) {
                preferences.forEach(pref => {
                    if (preferenceItems[pref]) {
                        optional.push(...preferenceItems[pref]);
                    }
                });
            }
            
            // 去重并限制数量
            mustHave = [...new Set(mustHave)].slice(0, 15);
            optional = [...new Set(optional)].slice(0, 12);
            
            // 生成提示
            let finalTips = tips.length > 0 ? tips.join(' ') : '请根据实际情况调整清单。';
            if (travel_days > 7) {
                finalTips += ' 行程较长，建议携带便携洗衣液。';
            }
            
            return {
                must_have: mustHave,
                optional: optional,
                tips: finalTips
            };
        }
        
        // 基础清单生成
        function generateBasicList(travelDays, weather) {
            const mustHave = [...baseMustHave, `换洗衣物(${travelDays}套)`];
            const optional = ['洗漱用品', '毛巾'];
            
            if (weather === '雨天') {
                mustHave.push('雨伞', '雨衣');
            } else if (weather === '低温' || weather === '寒冷') {
                mustHave.push('厚外套', '围巾');
            } else if (weather === '晴天' || weather === '炎热') {
                optional.push('帽子', '墨镜', '防晒霜');
            }
            
            return { must_have: mustHave, optional: optional };
        }
        
        // 模拟天气数据
        function getSimulatedWeather(destination) {
            const weathers = ['晴天', '阴天', '雨天'];
            const randomWeather = weathers[Math.floor(Math.random() * weathers.length)];
            const temps = ['15-22°C', '20-28°C', '25-32°C', '10-18°C'];
            const randomTemp = temps[Math.floor(Math.random() * temps.length)];
            
            return {
                destination: destination,
                weather: randomWeather,
                tempRange: randomTemp,
                humidity: '65%',
                suggestions: randomWeather === '雨天' ? '记得带伞' : randomWeather === '晴天' ? '注意防晒' : '天气舒适'
            };
        }
        
        // ===== localStorage 操作 =====
        
        const STORAGE_KEY = 'packing_list_history';
        
        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            const newItem = {
                id: Date.now(),
                ...data,
                created_at: new Date().toISOString()
            };
            history.unshift(newItem);
            // 只保留最近50条
            history = history.slice(0, 50);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            return newItem;
        }
        
        function getHistory() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }
        
        function getHistoryItem(id) {
            const history = getHistory();
            return history.find(item => item.id === id);
        }
        
        // ===== UI 交互 =====
        
        // 偏好标签选择
        document.querySelectorAll('.preference-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
        });
        
        // 获取选中的偏好
        function getSelectedPreferences() {
            return Array.from(document.querySelectorAll('.preference-tag.selected'))
                .map(tag => tag.dataset.value);
        }
        
        // 显示清单
        function displayList(listContent, aiTips = null, isAIGenerated = false) {
            const result = document.getElementById('result');
            const resultContent = document.getElementById('result-content');
            const aiBadge = document.getElementById('ai-badge');
            const aiTipsDiv = document.getElementById('ai-tips');
            const aiTipsContent = document.getElementById('ai-tips-content');
            
            if (!listContent || (!listContent.must_have && !listContent.optional)) {
                resultContent.innerHTML = '<div class="error">清单生成失败</div>';
                result.classList.add('show');
                return;
            }
            
            let html = '';
            
            if (listContent.must_have && listContent.must_have.length > 0) {
                html += `
                    <div class="item-category">
                        <h3>🎯 必带物品 (${listContent.must_have.length}件)</h3>
                        <ul class="item-list">
                            ${listContent.must_have.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (listContent.optional && listContent.optional.length > 0) {
                html += `
                    <div class="item-category">
                        <h3>✨ 可选物品 (${listContent.optional.length}件)</h3>
                        <ul class="item-list">
                            ${listContent.optional.map(item => `<li>${item}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            resultContent.innerHTML = html;
            
            // 显示AI相关元素
            if (isAIGenerated) {
                aiBadge.style.display = 'inline-block';
            } else {
                aiBadge.style.display = 'none';
            }
            
            if (aiTips) {
                aiTipsContent.textContent = aiTips;
                aiTipsDiv.style.display = 'block';
            } else {
                aiTipsDiv.style.display = 'none';
            }
            
            result.classList.add('show');
            
            // 滚动到结果区域
            result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        // 显示天气信息
        function displayWeather(weatherData) {
            const weatherInfo = document.getElementById('weather-info');
            const weatherDetails = document.getElementById('weather-details');
            
            if (weatherData) {
                weatherDetails.innerHTML = `
                    <strong>${weatherData.weather}</strong> | 
                    温度: ${weatherData.tempRange} | 
                    湿度: ${weatherData.humidity}<br>
                    ${weatherData.suggestions || ''}
                `;
                weatherInfo.classList.add('show');
            } else {
                weatherInfo.classList.remove('show');
            }
        }
        
        // 本地缓存
        const weatherCache = new Map();
        const CACHE_DURATION = 30 * 60 * 1000; // 30分钟缓存

        // 请求超时控制
        async function fetchWithTimeout(url, options = {}, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw error;
            }
        }

        // 调用后端天气 API（带重试机制）
        async function fetchWeather(destination) {
            // 检查缓存
            const cacheKey = `weather_${destination}`;
            const cachedData = weatherCache.get(cacheKey);
            const now = Date.now();
            
            if (cachedData && (now - cachedData.timestamp) < CACHE_DURATION) {
                console.log('使用缓存的天气数据');
                return cachedData.data;
            }
            
            // 实现重试机制
            let retries = 0;
            const maxRetries = 3;
            
            while (retries < maxRetries) {
                try {
                    const response = await fetchWithTimeout(`/api/weather?destination=${encodeURIComponent(destination)}`);
                    if (!response.ok) throw new Error('获取天气失败');
                    const data = await response.json();
                    
                    if (data.success) {
                        // 更新缓存
                        weatherCache.set(cacheKey, {
                            data: data.data,
                            timestamp: now
                        });
                        return data.data;
                    }
                    return null;
                } catch (error) {
                    retries++;
                    console.warn(`获取天气失败，正在重试 (${retries}/${maxRetries})...`);
                    if (retries >= maxRetries) {
                        console.error('获取天气失败，已达到最大重试次数');
                        // 使用增强的模拟数据作为备用
                        return getEnhancedSimulatedWeather(destination);
                    }
                    // 指数退避策略
                    await new Promise(resolve => setTimeout(resolve, 1000 * Math.pow(2, retries - 1)));
                }
            }
        }

        // 增强的模拟天气数据
        function getEnhancedSimulatedWeather(destination) {
            // 根据目的地提供更合理的模拟数据
            const destinationWeatherMap = {
                '北京': { weather: '晴', tempRange: '15~25°C', humidity: '45%', suggestions: '天气晴朗，注意防晒' },
                '上海': { weather: '多云', tempRange: '18~28°C', humidity: '65%', suggestions: '天气舒适，适合出行' },
                '广州': { weather: '晴', tempRange: '22~32°C', humidity: '75%', suggestions: '天气炎热，注意防暑' },
                '三亚': { weather: '晴', tempRange: '25~30°C', humidity: '80%', suggestions: '天气炎热，注意防晒和保湿' },
                '成都': { weather: '阴', tempRange: '16~22°C', humidity: '70%', suggestions: '天气凉爽，适合出行' },
                '杭州': { weather: '多云', tempRange: '17~25°C', humidity: '65%', suggestions: '天气舒适，适合出行' },
                '深圳': { weather: '晴', tempRange: '23~30°C', humidity: '70%', suggestions: '天气炎热，注意防晒' },
                '西安': { weather: '晴', tempRange: '14~23°C', humidity: '50%', suggestions: '天气晴朗，注意防晒' },
                '南京': { weather: '多云', tempRange: '16~24°C', humidity: '60%', suggestions: '天气舒适，适合出行' },
                '武汉': { weather: '晴', tempRange: '18~28°C', humidity: '65%', suggestions: '天气温暖，注意防晒' }
            };
            
            const weatherData = destinationWeatherMap[destination] || {
                weather: '晴',
                tempRange: '15~25°C',
                humidity: '65%',
                suggestions: '天气舒适，适合出行'
            };
            
            // 生成未来3天的预报
            const forecast3d = [];
            for (let i = 0; i < 3; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                forecast3d.push({
                    date: date.toISOString().split('T')[0],
                    weather: weatherData.weather,
                    tempMin: parseInt(weatherData.tempRange.split('~')[0]),
                    tempMax: parseInt(weatherData.tempRange.split('~')[1].replace('°C', ''))
                });
            }
            
            return {
                destination: destination,
                ...weatherData,
                forecast3d: forecast3d
            };
        }
        
        // 根据天气给出建议
        function getWeatherSuggestion(weather) {
            const suggestions = {
                'Clear': '天气晴朗，注意防晒',
                'Clouds': '天气多云，适合出行',
                'Rain': '有雨，记得带伞',
                'Drizzle': '有小雨，记得带伞',
                'Thunderstorm': '有雷阵雨，注意安全',
                'Snow': '有雪，注意保暖',
                'Mist': '有雾，能见度低',
                'Fog': '有雾，能见度低',
                'Haze': '有霾，注意防护',
                '晴': '天气晴朗，注意防晒',
                '多云': '天气舒适，适合出行',
                '阴': '天气阴沉，建议带件外套',
                '雨': '有雨，记得带伞',
                '小雨': '有小雨，记得带伞',
                '中雨': '有中雨，记得带伞',
                '大雨': '有大雨，尽量减少外出',
                '雪': '有雪，注意保暖',
                '雷阵雨': '有雷阵雨，注意安全'
            };
            return suggestions[weather] || '天气多变，注意携带合适衣物';
        }
        
        // 目的地输入时自动获取天气
        let weatherTimeout;
        let currentWeather = null;
        document.getElementById('destination').addEventListener('input', function() {
            clearTimeout(weatherTimeout);
            const destination = this.value.trim();
            
            if (destination.length >= 2) {
                weatherTimeout = setTimeout(async () => {
                    // 调用真实天气 API
                    currentWeather = await fetchWeather(destination);
                    displayWeather(currentWeather);
                }, 500);
            } else {
                document.getElementById('weather-info').classList.remove('show');
                currentWeather = null;
            }
        });
        
        // 快速生成
        document.getElementById('generate-btn').addEventListener('click', async function() {
            const travelDays = document.getElementById('travel-days').value;
            const destination = document.getElementById('destination').value;
            const resultContent = document.getElementById('result-content');
            
            // 显示加载状态
            document.getElementById('result').classList.add('show');
            resultContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>生成中...</p>
                </div>
            `;
            
            // 模拟延迟
            await new Promise(resolve => setTimeout(resolve, 500));
            
            // 获取天气
            let weather = currentWeather ? currentWeather.weather : '晴天';
            
            const listContent = generateBasicList(travelDays, weather);
            
            // 保存到历史记录
            saveToHistory({
                travel_days: parseInt(travelDays),
                destination: destination || null,
                weather: weather,
                list_content: listContent,
                ai_generated: false
            });
            
            displayList(listContent, null, false);
            loadHistory();
        });
        
        // AI智能生成 - 调用真实 API
        document.getElementById('generate-ai-btn').addEventListener('click', async function() {
            const travelDays = document.getElementById('travel-days').value;
            const destination = document.getElementById('destination').value;
            const tripPurpose = document.getElementById('trip-purpose').value;
            const travelerType = document.getElementById('traveler-type').value;
            const preferences = getSelectedPreferences();
            
            // 验证必填项
            if (!destination) {
                alert('请输入目的地');
                return;
            }
            
            const resultContent = document.getElementById('result-content');
            const btn = this;
            
            // 禁用按钮，显示加载状态
            btn.disabled = true;
            document.getElementById('result').classList.add('show');
            resultContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>AI正在为您生成个性化清单...</p>
                    <p style="font-size: 14px; color: #999;">正在连接智谱 AI...</p>
                </div>
            `;
            
            try {
                // 获取真实天气信息
                const weatherData = await fetchWeather(destination);
                if (weatherData) {
                    currentWeather = weatherData;
                    displayWeather(weatherData);
                }
                
                // 调用 EdgeOne Function 生成清单
                const response = await fetch('/api/generate-smart', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        travel_days: parseInt(travelDays),
                        destination,
                        weather: currentWeather ? currentWeather.weather : null,
                        trip_purpose: tripPurpose,
                        traveler_type: travelerType,
                        preferences
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'AI 生成失败');
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || '生成失败');
                }
                
                // 保存到历史记录
                saveToHistory({
                    travel_days: parseInt(travelDays),
                    destination: destination,
                    weather: currentWeather ? currentWeather.weather : null,
                    trip_purpose: tripPurpose || null,
                    traveler_type: travelerType || null,
                    preferences: preferences,
                    list_content: data.data.list_content,
                    ai_tips: data.data.ai_tips,
                    ai_generated: true
                });
                
                displayList(data.data.list_content, data.data.ai_tips, true);
                loadHistory();
            } catch (error) {
                console.error('AI生成错误:', error);
                // 如果 API 调用失败，使用本地逻辑作为备用
                resultContent.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>AI服务暂时不可用，使用本地智能生成...</p>
                    </div>
                `;
                
                await new Promise(resolve => setTimeout(resolve, 800));
                
                const weatherData = currentWeather || getSimulatedWeather(destination);
                displayWeather(weatherData);
                
                const listContent = await generateSmartList({
                    travel_days: parseInt(travelDays),
                    destination,
                    weather: weatherData.weather,
                    trip_purpose: tripPurpose,
                    traveler_type: travelerType,
                    preferences
                });
                
                saveToHistory({
                    travel_days: parseInt(travelDays),
                    destination: destination,
                    weather: weatherData.weather,
                    trip_purpose: tripPurpose || null,
                    traveler_type: travelerType || null,
                    preferences: preferences,
                    list_content: listContent,
                    ai_tips: listContent.tips,
                    ai_generated: true
                });
                
                displayList(listContent, listContent.tips, true);
                loadHistory();
            } finally {
                btn.disabled = false;
            }
        });
        
        // 加载历史记录
        function loadHistory() {
            const historyList = document.getElementById('history-list');
            
            try {
                const data = getHistory();
                
                if (data.length === 0) {
                    historyList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <p>暂无历史记录</p>
                        </div>
                    `;
                    return;
                }
                
                const html = data.map(item => `
                    <div class="history-item" onclick="loadHistoryItem(${item.id})">
                        <div class="info">
                            ${item.travel_days}天 · ${item.destination || '未指定目的地'} · ${item.weather || '未指定天气'}
                            ${item.ai_generated ? '<span class="ai-tag">AI</span>' : ''}
                        </div>
                        <div class="meta">
                            ${item.trip_purpose ? `<span>🎯 ${item.trip_purpose}</span>` : ''}
                            ${item.traveler_type ? `<span>👥 ${item.traveler_type}</span>` : ''}
                        </div>
                        <div class="date">${new Date(item.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
                
                historyList.innerHTML = html;
            } catch (error) {
                historyList.innerHTML = `<div class="error">加载历史记录失败：${error.message}</div>`;
            }
        }
        
        // 加载历史记录详情
        window.loadHistoryItem = function(id) {
            const resultContent = document.getElementById('result-content');
            
            document.getElementById('result').classList.add('show');
            resultContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载中...</p>
                </div>
            `;
            
            setTimeout(() => {
                const item = getHistoryItem(id);
                if (item) {
                    displayList(
                        item.list_content,
                        item.ai_tips,
                        item.ai_generated
                    );
                } else {
                    resultContent.innerHTML = `<div class="error">未找到该记录</div>`;
                }
            }, 300);
        };
        
        // 页面加载时加载历史记录
        window.onload = loadHistory;
    </script>
</body>
</html>
